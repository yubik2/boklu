<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barışalım işte</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
            background-color: #ffe6eb;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        #container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .gif-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
            margin-bottom: 20px;
        }

        .gif-container img {
            max-width: 45%; 
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(255, 107, 129, 0.2);
            margin-bottom: 0; 
        }

        .single-gif {
            max-width: 80%;
            height: auto;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(255, 107, 129, 0.2);
            margin-bottom: 20px;
        }

        h1 {
            color: #ff4757;
            font-size: 26px;
            margin: 0 0 10px 0;
            line-height: 1.3;
        }

        p {
            color: #57606f;
            font-size: 16px;
            margin: 0 0 30px 0;
            padding: 0 20px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
        }

        button {
            border: none;
            border-radius: 50px;
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 200px;
            padding: 15px 0;
        }

        #yes-btn {
            background-color: #ff6b81;
            color: white;
        }

        #yes-btn:active {
            transform: scale(0.95);
        }

        #no-btn {
            background-color: #f1f2f6;
            color: #a4b0be;
        }

        #dudi-btn {
            background-color: #a29bfe; 
            color: white;
            margin-top: 15px;
            animation: bounce 2s infinite; 
        }

        #dudi-btn:active {
            transform: scale(0.95);
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: #ff4757;
            border-radius: 50%;
            animation: fall 3s linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="gif-container" id="initial-gifs">
            <img id="bubu-gif" src="Crying bubu.gif" alt="Ağlayan Bubu">
            <img id="dudu-gif" src="dudu-crying.gif" alt="Ağlayan Dudu">
        </div>
        
        <h1 id="question">Boklu Hibiğim barışalım mı artık ☹️</h1>
        <p id="sub-text">Sensiz eksik hissediyorum işte. Ben seni gayette anlıyorum ve özür dilerim.</p>
        
        <div class="buttons">
            <button id="yes-btn" onclick="sayYes()">Evet! ❤️</button>
            <button id="no-btn" onclick="sayNo()">Hayır 😤</button>
        </div>
    </div>

    <script>
        let noClickCount = 0;
        const noButtonTexts = [
            "Emin misin?", 
            "Bir daha düşün bebişko", 
            "hibişkooommm hadiii", 
            "Çişli ya", 
            "İnat etme ya", 
            "hadi hadii barışalım işte", 
            "Tamam son kararın mı?",
            "lütfen"
        ];

        // TELEGRAM BİLDİRİM FONKSİYONU
        function sendTelegram(action) {
            const token = "8904304799:AAH8L2PR9k_JrHe7dcIexO8z6y0aoNJJQ40"; 
            const chatId = "8652909835"; 
            
            const time = new Date().toLocaleString('tr-TR');
            const message = "🔔 Siteden Bildirim!\n\nHareket: " + action + "\nSaat: " + time;

            fetch("https://api.telegram.org/bot" + token + "/sendMessage", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: message
                })
            }).catch(error => console.log("Telegram mesajı gönderilemedi."));
        }

        function sayNo() {
            noClickCount++;
            
            // Telegram'a Hayır mesajı gönder
            sendTelegram("Hayır butonuna bastı. (Kaçıncı: " + noClickCount + ")");

            const yesBtn = document.getElementById('yes-btn');
            const noBtn = document.getElementById('no-btn');
            const bubuGif = document.getElementById('bubu-gif');
            const duduGif = document.getElementById('dudu-gif');

            if (duduGif) {
                duduGif.style.display = 'none';
            }

            if (noClickCount < noButtonTexts.length) {
                noBtn.innerText = noButtonTexts[noClickCount];
            } else {
                noBtn.innerText = "Hala mı hayır?! 🥺";
            }

            const currentSize = parseFloat(window.getComputedStyle(yesBtn).fontSize);
            const currentPadding = parseFloat(window.getComputedStyle(yesBtn).paddingTop);
            const currentWidth = parseFloat(window.getComputedStyle(yesBtn).width);
            
            yesBtn.style.fontSize = (currentSize + 4) + 'px';
            yesBtn.style.padding = (currentPadding + 5) + 'px 0';
            yesBtn.style.width = (currentWidth + 20) + 'px';

            if(noClickCount === 2) {
                bubuGif.src = "dudu-making-bubu-cry-sad.gif"; 
                bubuGif.className = "single-gif"; 
            } else if (noClickCount === 5) {
                bubuGif.src = "bubu punching dudu.jpg";
                bubuGif.className = "single-gif";
            }
        }

        function sayYes() {
            // Telegram'a Evet mesajı gönder
            sendTelegram("EVET! Sonunda affetti ve Evet'e bastı! 🎉");

            // 1. Ses Efekti: Yippee hemen çalar (WAV)
            const yippeeSound = new Audio('Yippee Sound Effect.wav');
            yippeeSound.play();

            // 2. Ses Efekti: BubuSounds tam 2 saniye sonra çalar (WAV)
            setTimeout(() => {
                const bubuSound = new Audio('BubuSounds.wav');
                bubuSound.play();
            }, 2000);

            const container = document.getElementById('container');
            
            container.innerHTML = `
                <img src="kiss.gif" class="single-gif" alt="Mutlu Bubu Dudu">
                <h1 style="color: #ff4757; font-size: 32px; margin-top: 10px;">YUPPİİİEİEİEİEİEİEİE! 🎉</h1>
                <p style="color: #2f3542; font-size: 18px; font-weight: bold; margin-bottom: 10px;">Seni çok sebiom boklu ya😝</p>
                <button id="dudi-btn" onclick="playDudi()">DUDİ DUDİ DAM DAM</button>
            `;

            for(let i=0; i<50; i++) {
                createConfetti();
            }
        }

        // DUDİ Butonuna basıldığında çalışacak fonksiyon
        function playDudi() {
            // Telegram'a bildirim at
            sendTelegram("DUDİ DUDİ DAM DAM butonuna bastı! 🕺💃");

            // Dudidudidamdam müziğini çal (WAV)
            const dudiSes = new Audio('dudidudidamdam.wav');
            dudiSes.play();
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            
            const colors = ['#ff6b81', '#ff4757', '#ffa502', '#2ed573', '#1e90ff'];
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
            
            document.body.appendChild(confetti);
        }
    </script>
</body>
</html>
